name: Update checksums for Renovate PRs

on:
  push:
    branches:
      - 'renovate/**'
    paths:
      - 'Casks/*.rb'
      - 'Formula/*.rb'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-checksums:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Find changed cask/formula files
        id: changed
        run: |
          files=$(git diff --name-only origin/main -- 'Casks/*.rb' 'Formula/*.rb' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Changed: $files"

      - name: Update checksums
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: bash Scripts/update-checksums.sh $CHANGED_FILES

      - name: Commit updated checksums
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No checksum changes needed"
          else
            git commit -m "fix: update sha256 checksums"
            git push
          fi
