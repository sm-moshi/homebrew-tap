# homebrew-tap checksums — auto-update sha256 on Renovate version-bump branches
when:
  - event: push
    branch: "renovate/*"
    path:
      - "Formula/**"
      - "Casks/**"

steps:
  - name: update-checksums
    image: ghcr.io/homebrew/brew:latest@sha256:14cfe86224c7e8f425063b6af7679566a66225262a7f8b6063b0bdc177509178
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - CHANGED=$(git diff --name-only origin/main -- 'Casks/*.rb' 'Formula/*.rb' | tr '\n' ' ')
      - |
        if [ -z "$CHANGED" ]; then
          echo "No changed formula/cask files"
          exit 0
        fi
      - echo "Changed files: $CHANGED"
      - bash Scripts/update-checksums.sh $CHANGED
      - git config user.name "Woodpecker CI"
      - git config user.email "ci@m0sh1.cc"
      - 'git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/sm-moshi/tap.git"'
      - git add Formula/ Casks/
      - |
        if git diff --cached --quiet; then
          echo "No checksum changes needed"
          exit 0
        fi
      - git commit -m "fix: update sha256 checksums [CI SKIP]"
      - git push origin HEAD