# homebrew-tap test — audit + install + test formulae on macOS via SSH
when:
  - event: pull_request
    path:
      - "Formula/**"
      - "Casks/**"
  - event: push
    branch: main
    path:
      - "Formula/**"
      - "Casks/**"
  - event: manual

steps:
  - name: test-macos
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      SSH_KEY:
        from_secret: mac_builder_ssh_key
    commands:
      - apk add --no-cache openssh-client bash
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H 10.0.10.4 >> ~/.ssh/known_hosts 2>/dev/null
      - |
        ssh smeya@10.0.10.4 "export GITHUB_TOKEN='${GITHUB_TOKEN}'; export CI_COMMIT_SHA='${CI_COMMIT_SHA}'; export CI_COMMIT_PULL_REQUEST='${CI_COMMIT_PULL_REQUEST:-}'; bash" <<'REMOTE_EOF'
        set -euo pipefail
        WORKDIR=$(mktemp -d)
        git clone --depth=50 "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/tap.git" "$WORKDIR"
        cd "$WORKDIR"
        if [ -n "${CI_COMMIT_PULL_REQUEST:-}" ]; then
          git fetch origin "pull/${CI_COMMIT_PULL_REQUEST}/head" --depth=50
          git checkout FETCH_HEAD
        else
          git checkout "${CI_COMMIT_SHA}"
        fi
        bash "$WORKDIR/Scripts/test-macos.sh" "$WORKDIR"
        rm -rf "$WORKDIR"
        REMOTE_EOF