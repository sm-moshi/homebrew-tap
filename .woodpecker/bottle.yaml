# homebrew-tap bottle — build ARM64 bottle on Mac via SSH, release to GitHub
when:
  - event: push
    branch: main
    path:
      - "Formula/fast-cli.rb"
  - event: manual

steps:
  - name: bottle-arm
    image: appleboy/drone-ssh
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    settings:
      host: 10.0.10.4
      username: smeya
      key:
        from_secret: mac_builder_ssh_key
      port: 22
      command_timeout: 30m
      script_stop: true
      envs:
        - GITHUB_TOKEN
        - CI_COMMIT_SHA
      script:
        - set -euo pipefail
        - WORKDIR=$(mktemp -d)
        - git clone --depth=50 "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/homebrew-tap.git" "$WORKDIR"
        - cd "$WORKDIR" && git checkout "${CI_COMMIT_SHA}"
        - bash "$WORKDIR/Scripts/bottle-arm.sh" "$WORKDIR"
        - rm -rf "$WORKDIR"
