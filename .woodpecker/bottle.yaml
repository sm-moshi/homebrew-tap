# homebrew-tap bottle — build ARM64 bottle on Mac via SSH, release to GitHub
when:
  - event: push
    branch: main
    path:
      - "Formula/fast-cli.rb"
  - event: manual

steps:
  - name: bottle-arm
    image: dhi.io/alpine-base:3.23-dev
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      SSH_KEY:
        from_secret: mac_builder_ssh_key
    commands:
      - apk add --no-cache openssh-client bash
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H 10.0.10.4 >> ~/.ssh/known_hosts 2>/dev/null
      - |
        ssh smeya@10.0.10.4 "export GITHUB_TOKEN='${GITHUB_TOKEN}'; export CI_COMMIT_SHA='${CI_COMMIT_SHA}'; bash" <<'REMOTE_EOF'
        set -euo pipefail
        WORKDIR=$(mktemp -d)
        git clone --depth=50 "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/homebrew-tap.git" "$WORKDIR"
        cd "$WORKDIR" && git checkout "${CI_COMMIT_SHA}"
        export GITHUB_TOKEN
        bash "$WORKDIR/Scripts/bottle-arm.sh" "$WORKDIR"
        rm -rf "$WORKDIR"
        REMOTE_EOF
